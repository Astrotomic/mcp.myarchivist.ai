name: pint

on:
  pull_request:
  push:

jobs:
  pint:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: ./vendor/bin/pint --test
